# 基础 / dev compose：镜像和 env 都从外部注入，不带网络（用默认）。
# 部署时 CI 会从 Gitea 下载本文件，并叠加 docker-compose.override.yml 注入外部 self 网络。
services:
  gh-smart-proxy:
    image: "${IMAGE:-gh-smart-proxy:local}"
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        USE_MIRROR: "${USE_MIRROR:-false}"
    container_name: "${CONTAINER_NAME:-gh-smart-proxy}"
    restart: unless-stopped
    environment:
      PROXY_SECRET: "${PROXY_SECRET:-}"
      ADDR: "${ADDR:-:8080}"
      RATE_LIMIT: "${RATE_LIMIT:-120}"
      RATE_WINDOW_SECONDS: "${RATE_WINDOW_SECONDS:-60}"
      TZ: "${TZ:-Asia/Shanghai}"
    expose:
      - "8080"
    # 本地直连测试可打开（生产走外部 self 网络 + 反代）：
    # ports:
    #   - "8080:8080"
