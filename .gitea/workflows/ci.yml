name: CI

# 参考 reference-project 的 .gitea/workflows/ci.yml：手动触发，
# runner 构建镜像推到 Gitea 内置 registry，再 SSH 到服务器 docker run 重启。
on:
  workflow_dispatch:
    inputs:
      run_build:
        description: '构建并推送镜像'
        type: boolean
        default: true
      run_deploy:
        description: '部署'
        type: boolean
        default: true

# 可配置项优先用仓库 Variables(vars)，带默认值；Secrets 用 CI_TOKEN + SSH_PRIVATE_KEY。
# 详见 README「CI/CD 部署」。

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          REGISTRY="${{ vars.REGISTRY_HOST || '<REGISTRY_HOST>' }}"
          IMAGE_REPO="${{ github.repository }}"
          AUTH=$(echo -n "${{ github.repository_owner }}:${{ secrets.CI_TOKEN }}" | base64 -w0)

          # 从 registry 取上次推送镜像的 config digest
          CONFIG_DIGEST=$(curl -sf \
            -H "Authorization: Basic $AUTH" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json" \
            "https://$REGISTRY/v2/$IMAGE_REPO/manifests/latest" \
            | jq -r '.config.digest // ""')

          LAST_SHA=""
          if [ -n "$CONFIG_DIGEST" ]; then
            LAST_SHA=$(curl -sf \
              -H "Authorization: Basic $AUTH" \
              "https://$REGISTRY/v2/$IMAGE_REPO/blobs/$CONFIG_DIGEST" \
              | jq -r '.config.Labels["org.opencontainers.image.revision"] // ""')
          fi

          CURRENT_SHA=$(git rev-parse HEAD)
          if [ -z "$LAST_SHA" ] || [ "$LAST_SHA" != "$CURRENT_SHA" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-changes
    if: |
      needs.check-changes.outputs.should_build == 'true' &&
      (github.event_name != 'workflow_dispatch' || inputs.run_build == true) &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["${{ vars.DOCKERHUB_MIRROR || '<DOCKERHUB_MIRROR>' }}"]

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST || '<REGISTRY_HOST>' }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CI_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ vars.REGISTRY_HOST || '<REGISTRY_HOST>' }}/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ vars.REGISTRY_HOST || '<REGISTRY_HOST>' }}/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ vars.REGISTRY_HOST || '<REGISTRY_HOST>' }}/${{ github.repository }}:buildcache,mode=max

  deploy:
    needs: [check-changes, build]
    if: |
      always() &&
      needs.check-changes.outputs.should_build == 'true' &&
      needs.build.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_SSH_USER || 'example-user' }}
          port: ${{ vars.DEPLOY_SSH_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PROXY_SECRET
          script: |
            REGISTRY="${{ vars.REGISTRY_HOST || '<REGISTRY_HOST>' }}"
            GITEA="${{ vars.GITEA_HOST || vars.REGISTRY_HOST || '<REGISTRY_HOST>' }}"
            REPO="${{ github.repository }}"
            NAME="${{ vars.CONTAINER_NAME || 'gh-smart-proxy' }}"
            DEPLOY_DIR="${{ vars.DEPLOY_DIR }}"
            DEPLOY_DIR="${DEPLOY_DIR:-<DEPLOY_BASE_DIR>/$NAME}"
            TOKEN="${{ secrets.CI_TOKEN }}"
            # IMAGE 由 CI 计算、PROXY_SECRET 由 envs 注入；compose 从 shell env 插值这两个
            export IMAGE="$REGISTRY/$REPO:latest"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            # 从 Gitea API 下载仓库里的 compose（单文件；仓库默认不带 network）
            curl -fsSL -H "Authorization: token $TOKEN" \
              "https://$GITEA/api/v1/repos/$REPO/raw/deploy/docker-compose.yml?ref=main" \
              -o docker-compose.yml
            # CI 装配外部网络 self（docker compose 会自动合并 docker-compose.override.yml）
            printf 'services:\n  gh-smart-proxy:\n    networks:\n      - self\nnetworks:\n  self:\n    external: true\n' > docker-compose.override.yml
            docker network create self 2>/dev/null || true
            echo "$TOKEN" | docker login "$REGISTRY" -u "${{ github.repository_owner }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            sleep 3
            docker compose ps
            docker compose logs --tail 5
